<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Loopin</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f8fffe 0%, #fff9f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        :root {
            --pastel-green: #A8E6CF;
            --pastel-green-dark: #7DC4A5;
            --pastel-blue: #A8D8EA;
            --pastel-blue-dark: #7BB8CC;
            --pastel-yellow: #FFEAA7;
            --pastel-pink: #FFB8B8;
            --pastel-purple: #DDA0DD;
            --white: #FFFFFF;
            --soft-gray: #F5F5F5;
            --text-dark: #4A4A4A;
            --text-light: #7A7A7A;
            --error: #FF6B6B;
        }

        .login-container {
            width: 100%;
            max-width: 450px;
        }

        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            border-radius: 25px;
            object-fit: contain;
            box-shadow: 0 10px 30px rgba(168, 230, 207, 0.4);
            margin: 0 auto 20px;
        }

        .app-title {
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--pastel-green-dark) 0%, var(--pastel-blue-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .login-card {
            background: var(--white);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.08);
            border: 3px solid var(--pastel-blue);
        }

        .card-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text-dark);
            text-align: center;
            margin-bottom: 8px;
        }

        .card-subtitle {
            font-size: 16px;
            color: var(--text-light);
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 16px 22px;
            border: 3px solid var(--soft-gray);
            border-radius: 18px;
            font-size: 16px;
            font-family: 'Nunito', sans-serif;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.3s ease;
            background: var(--soft-gray);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--pastel-blue);
            background: var(--white);
            box-shadow: 0 6px 20px rgba(168, 216, 234, 0.3);
        }

        .form-input::placeholder {
            color: #B0B0B0;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--pastel-blue) 0%, var(--pastel-blue-dark) 100%);
            color: #2D5A6A;
            border: none;
            padding: 18px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0 var(--pastel-blue-dark), 0 10px 20px rgba(168, 216, 234, 0.4);
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--pastel-blue-dark), 0 14px 25px rgba(168, 216, 234, 0.5);
        }

        .btn-login:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--pastel-blue-dark);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .divider {
            text-align: center;
            margin: 30px 0;
            color: var(--text-light);
            font-weight: 600;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 2px;
            background: var(--soft-gray);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .signup-link {
            text-align: center;
        }

        .signup-link a {
            color: var(--pastel-green-dark);
            font-weight: 700;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .signup-link a:hover {
            color: var(--pastel-blue-dark);
        }

        .back-link {
            text-align: center;
            margin-top: 25px;
        }

        .back-link a {
            color: var(--text-light);
            font-weight: 600;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link a:hover {
            color: var(--text-dark);
        }

        .alert {
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 20px;
            font-weight: 600;
            display: none;
        }

        .alert-error {
            background: #FFE5E5;
            color: #CC4444;
            border: 2px solid #FFB8B8;
        }

        .alert-success {
            background: #E5FFE5;
            color: #44AA44;
            border: 2px solid #A8E6CF;
        }

        .mascot {
            text-align: center;
            font-size: 40px;
            margin-top: 25px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo-section">
            <img src="/images/logo.png" alt="Loopin Logo" class="logo-icon">
            <h1 class="app-title">Loopin</h1>
        </div>

        <div class="login-card">
            <h2 class="card-title">Welcome Back!</h2>
            <p class="card-subtitle">Login to continue your habit journey</p>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="password" placeholder="Enter your password" required>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    Login
                </button>
            </form>

            <div class="divider">or</div>

            <div class="signup-link">
                Don't have an account? <a href="/signup">Sign up here!</a>
            </div>
        </div>

        <div class="back-link">
            <a href="/">← Back to Home</a>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:3001/api';

        // Check if already logged in
        if (localStorage.getItem('loopin_token')) {
            window.location.href = '/home';
        }

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorAlert = document.getElementById('errorAlert');
        const successAlert = document.getElementById('successAlert');

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
            successAlert.style.display = 'none';
        }

        function showSuccess(message) {
            successAlert.textContent = message;
            successAlert.style.display = 'block';
            errorAlert.style.display = 'none';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            loginBtn.disabled = true;
            loginBtn.textContent = 'Logging in...';

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (data.success) {
                    showSuccess(data.message);
                    localStorage.setItem('loopin_token', data.data.token);
                    localStorage.setItem('loopin_user', JSON.stringify(data.data.user));
                    
                    setTimeout(() => {
                        window.location.href = '/home';
                    }, 1000);
                } else {
                    showError(data.message);
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Login';
                }
            } catch (error) {
                showError('Connection error. Please try again.');
                loginBtn.disabled = false;
                loginBtn.textContent = 'Login';
            }
        });
    </script>
</body>
</html>
