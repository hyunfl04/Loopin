<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopin - Profile Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* GIỮ NGUYÊN STYLE GỐC CỦA BẠN */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Nunito', sans-serif; background: linear-gradient(135deg, #f8fffe 0%, #fff9f0 100%); min-height: 100vh; padding: 20px; }
        :root { --pastel-green: #A8E6CF; --pastel-green-dark: #7DC4A5; --pastel-blue: #A8D8EA; --pastel-blue-dark: #7BB8CC; --pastel-yellow: #FFEAA7; --pastel-yellow-dark: #F0D78A; --pastel-pink: #FFB8B8; --pastel-pink-dark: #E89A9A; --pastel-purple: #DDA0DD; --white: #FFFFFF; --soft-gray: #F5F5F5; --text-dark: #4A4A4A; --text-light: #7A7A7A; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* NAVBAR TƯƠNG TỰ HOME */
        .navbar { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: var(--white); border-radius: 20px; margin-bottom: 30px; box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05); }
        .btn-back { background: var(--soft-gray); border: none; padding: 10px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; color: var(--text-dark); cursor: pointer; text-decoration: none; }

        /* SECTION CHUNG */
        .profile-section { background: var(--white); border-radius: 30px; padding: 35px; margin-bottom: 30px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06); }
        .section-title { font-size: 24px; font-weight: 800; color: var(--text-dark); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }

        /* 1. EDIT AVATAR STYLES */
        .avatar-editor { display: flex; flex-direction: column; align-items: center; gap: 30px; }
        .avatar-preview-lg { width: 150px; height: 150px; background: linear-gradient(135deg, var(--pastel-blue) 0%, var(--pastel-purple) 100%); border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 70px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); border: 5px solid white; }
        .avatar-options { display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr)); gap: 15px; width: 100%; }
        .avatar-item { aspect-ratio: 1; background: var(--soft-gray); border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; cursor: pointer; transition: 0.3s; border: 3px solid transparent; }
        .avatar-item:hover { transform: scale(1.1); background: var(--white); border-color: var(--pastel-green); }
        .avatar-item.active { border-color: var(--pastel-green); background: var(--white); box-shadow: 0 5px 15px rgba(168, 230, 207, 0.5); }

        /* 2. PREMIUM CARD STYLES */
        .premium-banner { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 25px; padding: 30px; display: flex; justify-content: space-between; align-items: center; position: relative; overflow: hidden; }
        .premium-content h3 { font-size: 22px; margin-bottom: 8px; }
        .premium-content p { font-size: 14px; opacity: 0.9; margin-bottom: 15px; }
        .btn-upgrade { background: var(--pastel-yellow); color: #8B7355; border: none; padding: 12px 25px; border-radius: 15px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-upgrade:hover { transform: translateY(-3px); box-shadow: 0 5px 15px rgba(255, 234, 167, 0.4); }
        
        /* 3. SETTINGS INPUTS */
        .form-group { margin-bottom: 20px; }
        .label { display: block; font-weight: 700; margin-bottom: 8px; color: var(--text-dark); }
        .input-field { width: 100%; padding: 15px; border-radius: 15px; border: 2px solid var(--soft-gray); font-family: inherit; font-size: 16px; }

        @media (max-width: 600px) {
            .premium-banner { flex-direction: column; text-align: center; gap: 20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <nav class="navbar">
            <a href="home.html" class="btn-back">← Back to Dashboard</a>
            <div class="user-name" style="font-weight: 800;">Account Settings</div>
        </nav>

        <section class="profile-section">
            <h2 class="section-title"><span>👤</span> Character Avatar</h2>
            <div class="avatar-editor">
                <div class="avatar-preview-lg" id="mainAvatar">🐱</div>
                
                <div style="width: 100%;">
                    <p class="label">Choose your character style:</p>
                    <div class="avatar-options" id="avatarPicker">
                        <div class="avatar-item active" data-char="🐱">🐱</div>
                        <div class="avatar-item" data-char="🦊">🦊</div>
                        <div class="avatar-item" data-char="🐼">🐼</div>
                        <div class="avatar-item" data-char="🦁">🦁</div>
                        <div class="avatar-item" data-char="🐸">🐸</div>
                        <div class="avatar-item" data-char="🦄">🦄</div>
                        <div class="avatar-item" data-char="🤖">🤖</div>
                        <div class="avatar-item" data-char="👻">👻</div>
                    </div>
                </div>
                <button onclick="saveChanges()" class="btn-upgrade" style="background: var(--pastel-green); color: #2D6A4F; width: 100%; padding: 18px;">
    Save Avatar Changes
</button>
        </section>

        <section class="profile-section">
            <h2 class="section-title"><span>👑</span> Loopin Premium</h2>
            <div class="premium-banner">
                <div class="premium-content">
                    <h3>Unlock Full Potential</h3>
                    <p>Get unlimited habits, advanced analytics, and exclusive legendary avatars!</p>
                    <button class="btn-upgrade">Upgrade to Pro - $1.99/mo</button>
                </div>
                <div style="font-size: 60px;">💎</div>
            </div>
        </section>

        <section class="profile-section">
            <h2 class="section-title"><span>⚙️</span> Basic Information</h2>
            <div class="form-group">
                <label class="label">Display Name</label>
                <input type="text" class="input-field" value="User" id="editUsername">
            </div>
            <div class="form-group">
                <label class="label">Email Address</label>
                <input type="email" class="input-field" value="user@example.com" id="editEmail">
            </div>
            <button onclick="saveChanges()" class="btn-upgrade" style="background: var(--soft-gray); color: var(--text-dark); width: 100%; padding: 15px;">
    Update Profile
</button>
        </section>
    </div>

    <script>
    const token = localStorage.getItem('loopin_token');
    if (!token) window.location.href = '/login';

    // 1. Tải dữ liệu ban đầu
    async function loadUserData() {
    // Lấy dữ liệu từ localStorage
    const userData = JSON.parse(localStorage.getItem('loopin_user') || '{}');
    const userId = userData._id || userData.id;
    const token = localStorage.getItem('loopin_token');

    if (!userId) {
        window.location.href = 'login.html';
        return;
    }

    try {
        // Gửi kèm userId trong query string để tránh 404/400
        const res = await fetch(`http://localhost:3001/api/users/profile?userId=${userId}`, {
            headers: { 'Authorization': `Bearer ${token}` }
        });

        const result = await res.json();
        if (result.success) {
            const user = result.data;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editEmail').value = user.email;
            document.getElementById('mainAvatar').textContent = user.avatar || '🐱';
        }
    } catch (err) {
        console.error('Error loading profile:', err);
    }
}

    // 2. Logic chọn Avatar
    const avatarItems = document.querySelectorAll('.avatar-item');
    const mainAvatar = document.getElementById('mainAvatar');
    
    avatarItems.forEach(item => {
        item.addEventListener('click', () => {
            avatarItems.forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            mainAvatar.textContent = item.dataset.char;
        });
    });
    function selectAvatar(emoji) {
    document.getElementById('mainAvatar').textContent = emoji;
    closeAvatarModal();
}

    function updateAvatarPickerUI(currentAvatar) {
        avatarItems.forEach(item => {
            if(item.dataset.char === currentAvatar) item.classList.add('active');
            else item.classList.remove('active');
        });
    }

    // 3. Hàm Lưu thay đổi (Quan trọng nhất)
    async function saveChanges() {
    const username = document.getElementById('editUsername').value;
    const email = document.getElementById('editEmail').value;
    const avatar = document.getElementById('mainAvatar').textContent;
    
    // Lấy thông tin user hiện tại
    const userData = JSON.parse(localStorage.getItem('loopin_user') || '{}');
    const userId = userData._id || userData.id;
    const token = localStorage.getItem('loopin_token');

    try {
        const res = await fetch('http://localhost:3001/api/users/update-profile', {
            method: 'PUT',
            headers: { 
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${token}` 
            },
            // PHẢI gửi kèm userId để Backend biết update ai
            body: JSON.stringify({ userId, username, email, avatar })
        });

        const result = await res.json();
        
        if (result.success) {
            // CẬP NHẬT QUAN TRỌNG: Ghi đè dữ liệu mới vào LocalStorage
            // result.data là object user mới trả về từ Backend
            localStorage.setItem('loopin_user', JSON.stringify(result.data));
            
            alert('Profile updated successfully! ✨');
            
            // Chuyển về home, lúc này Home sẽ đọc LocalStorage mới và hiển thị đúng
            window.location.href = 'home.html';
        } else {
            alert(result.message || 'Update failed');
        }
    } catch (err) {
        console.error(err);
        alert('Server error, please try again.');
    }
}
    // 4. Upgrade Premium
    async function upgradeToPremium() {
        try {
            const res = await fetch('http://localhost:3001/api/users/upgrade', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await res.json();
            alert(result.message);
            if(result.success) location.reload();
        } catch (err) {
            alert('Upgrade failed');
        }
    }

    // Chạy khi load trang
    loadUserData();
</script>
</body>
</html>
