<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopin - Star Calendar ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-pink: #FFB8B8; --p-pink-dark: #E89A9A; --p-pink-light: #FFE4E4;
            --p-green: #A8E6CF; --p-green-dark: #7DC4A5;
            --p-yellow: #FFEAA7; --p-blue: #A8D8EA;
            --white: #FFFFFF; --text: #4A4A4A; --text-light: #7A7A7A;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #f8fffe 0%, #fff9f0 100%);
            color: var(--text); padding: 20px; min-height: 100vh;
        }

        .container { max-width: 450px; margin: 0 auto; }

        .card {
            background: var(--white); border-radius: 30px; padding: 25px;
            margin-bottom: 20px; box-shadow: 0 10px 40px rgba(0, 0, 0, 0.06);
            text-align: center; border: 3px solid transparent;
        }

        /* Profile Card - Giống home.html */
        .profile-card { border-bottom: 6px solid var(--p-pink); }
        .level-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .level-tag { background: var(--p-pink); color: white; padding: 6px 16px; border-radius: 15px; font-weight: 800; font-size: 14px; }
        
        .pet-stage { font-size: 14px; font-weight: 700; color: var(--p-pink-dark); margin-bottom: 10px; }
        #petEmoji {
    display: block;
    text-shadow: 0 10px 20px rgba(255, 184, 184, 0.5); /* Đổ bóng hồng nhạt */
    cursor: default;
    user-select: none;
}

/* Hiệu ứng rung rinh khi di chuột vào (Gà con sẽ nhảy) */
#petEmoji:hover {
    animation: chickJump 0.5s ease-out;
}

@keyframes chickJump {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2) translateY(-15px); }
}

        .xp-bar-bg { background: #F0F0F0; height: 12px; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        .xp-bar-fill { background: linear-gradient(90deg, var(--p-pink), var(--p-yellow)); height: 100%; width: 0%; transition: width 0.8s ease; }

        /* Progress Card */
        .progress-card { border-bottom: 6px solid var(--p-green); }
        .stats-row { display: flex; align-items: center; gap: 20px; justify-content: center; margin-top: 15px; }
        .circle-box {
            width: 100px; height: 100px; border-radius: 50%;
            background: conic-gradient(var(--p-green) 0%, #F0F0F0 0%);
            display: flex; align-items: center; justify-content: center; position: relative;
        }
        .circle-box::after { content: ""; position: absolute; width: 80px; height: 80px; background: white; border-radius: 50%; }
        .circle-text { position: relative; z-index: 10; font-weight: 800; font-size: 18px; color: var(--p-green-dark); }

        /* Calendar Card */
        .calendar-card { border-bottom: 6px solid var(--p-blue); }
        .calendar-title { color: var(--p-pink-dark); font-size: 20px; font-weight: 800; margin-bottom: 5px; }
        .calendar-today { font-size: 12px; color: var(--text-light); margin-bottom: 20px; font-weight: 600; }
        
        .weekday-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 10px; }
        .weekday { font-size: 11px; font-weight: 800; color: #BBB; text-transform: uppercase; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-star { 
            aspect-ratio: 1; background: #F9F9F9; border-radius: 12px; 
            display: flex; align-items: center; justify-content: center;
            font-size: 13px; font-weight: 700; color: #CCC; transition: 0.3s;
            border: 1px solid #EEE;
        }
        .day-star.active { 
            background: var(--p-yellow); border-color: #F0D78A; 
            font-size: 18px; color: var(--white); box-shadow: 0 4px 10px rgba(240, 215, 138, 0.4);
        }
        .day-star.is-today { border: 2px solid var(--p-pink); color: var(--p-pink); }

        .btn-back {
            display: block; width: fit-content; margin: 25px auto;
            padding: 14px 35px; background: linear-gradient(135deg, var(--p-pink) 0%, var(--p-pink-dark) 100%);
            color: white; border-radius: 20px; text-decoration: none; font-weight: 800;
            box-shadow: 0 6px 15px rgba(255, 184, 184, 0.4); transition: 0.3s;
        }
        .btn-back:hover { transform: translateY(-3px); box-shadow: 0 8px 20px rgba(255, 184, 184, 0.5); }
    </style>
</head>
<body>

<div class="container">
    <div class="card profile-card">
        <div class="level-header">
            <span style="font-weight: 800; font-size: 18px;" id="userName">Buddy ✨</span>
            <div class="level-tag">Lv. <span id="lblLevel">1</span></div>
        </div>
        <div class="pet-stage" id="lblStage">Stage: Baby Egg</div>
        <div class="pet-avatar-container">
            <span id="petEmoji" style="font-size: 80px; display: block; animation: loopyFloat 3s ease-in-out infinite;">🥚</span>
</div>
        <div class="xp-bar-bg">
            <div id="xpFill" class="xp-bar-fill"></div>
        </div>
        <p style="font-size: 12px; margin-top: 10px; color: var(--text-light); font-weight: 600;">Rooting for you! 🌟</p>
    </div>

    <div class="card progress-card">
        <h3 style="font-size: 17px; font-weight: 800;">Today's Progress</h3>
        <div class="stats-row">
            <div class="circle-box" id="dailyCircle">
                <span class="circle-text" id="lblPercent">0%</span>
            </div>
            <div style="text-align: left;">
                <p id="lblHabitCount" style="font-weight: 800; font-size: 18px;">0/0 Habits</p>
                <p style="font-size: 13px; color: var(--text-light); font-weight: 600;">Consistency is key! 💪</p>
            </div>
        </div>
    </div>

    <div class="card">
    <h3 id="monthDisplay" style="margin-bottom: 5px; font-size: 18px; color: var(--p-pink);">Month Year</h3>
    <p id="todayDisplay" style="font-size: 13px; color: #888; margin-bottom: 15px;">Today: DD/MM/YYYY</p>
    
    <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 5px;">
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">SUN</div>
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">MON</div>
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">TUE</div>
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">WED</div>
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">THU</div>
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">FRI</div>
        <div style="font-size: 11px; font-weight: 800; color: #BBB;">SAT</div>
    </div>
    
    <div class="calendar-grid" id="calendarGrid"></div>
</div>

    <a href="home.html" class="btn-back">Back to Home 👋</a>
</div>

<script>
    const API_URL = 'http://localhost:3001/api';

    async function initDashboard() {
        const token = localStorage.getItem('loopin_token');
        if (!token) window.location.href = 'login.html';

        try {
            // 1. Fetch Profile & Stats
            const [userRes, statsRes] = await Promise.all([
                fetch(`${API_URL}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` }}),
                fetch(`${API_URL}/habits/stats`, { headers: { 'Authorization': `Bearer ${token}` }})
            ]);

            const userData = await userRes.json();
            const statsData = await statsRes.json();
            const user = userData.data.user;
            const stats = statsData.data.stats;

            // Sync Profile UI
            document.getElementById('userName').innerText = `${user.username}'s Buddy ✨`;
            document.getElementById('lblLevel').innerText = user.level || 1;
            const xpNeeded = (user.level || 1) * 100;
            document.getElementById('xpFill').style.width = Math.min(((user.xp || 0) / xpNeeded) * 100, 100) + '%';

           // Tìm đoạn // Pet Evolution và thay thế bằng logic này:
const petEmoji = document.getElementById('petEmoji');
const lblStage = document.getElementById('lblStage');
const level = user.level || 1;

if (level >= 20) {
    petEmoji.innerText = "🐓"; // Gà trống (Giai đoạn trưởng thành)
    lblStage.innerText = "Stage: Golden Rooster";
    lblStage.style.color = "#FFD700"; // Màu vàng kim
} else if (level >= 10) {
    petEmoji.innerText = "🐔"; // Gà mái/Gà lớn (Giai đoạn thiếu niên)
    lblStage.innerText = "Stage: Teen Chicken";
    lblStage.style.color = "#E89A9A";
} else if (level >= 3) {
    petEmoji.innerText = "🐥"; // Gà con (Giai đoạn mới nở)
    lblStage.innerText = "Stage: Little Chick";
    lblStage.style.color = "#FFD93D";
} else {
    petEmoji.innerText = "🥚"; // Trứng (Giai đoạn khởi đầu)
    lblStage.innerText = "Stage: Mystery Egg";
    lblStage.style.color = "#7A7A7A";
}

            // Sync Progress Circle
            const deg = (stats.completionRate / 100) * 360;
            document.getElementById('dailyCircle').style.background = `conic-gradient(var(--p-green) ${deg}deg, #F0F0F0 ${deg}deg)`;
            document.getElementById('lblPercent').innerText = stats.completionRate + '%';
            document.getElementById('lblHabitCount').innerText = `${stats.checkedInToday}/${stats.totalHabits} Habits`;

            // 2. Render Real-Time Calendar
            renderCalendar(stats.checkInDays || []); // Giả định backend trả về mảng các ngày đã checkin: ["2026-03-18", "2026-03-20"]

        } catch (err) {
            console.error("Dashboard Sync Error:", err);
        }
    }

    function renderCalendar(checkInDays) {
    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';
    
    const now = new Date();
    const year = now.getFullYear();
    const month = now.getMonth();
    
    // Cập nhật tiêu đề tháng và ngày hiện tại
    const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    document.getElementById('monthDisplay').innerText = `${monthNames[month]} ${year}`;
    document.getElementById('todayDisplay').innerText = `Today: ${now.getDate()}/${month + 1}/${year}`;

    // Tính toán ngày bắt đầu và số ngày trong tháng
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    // Ô trống cho các ngày của tháng trước
    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(document.createElement('div'));
    }

    // Vẽ các ngày trong tháng
    for (let i = 1; i <= daysInMonth; i++) {
        const dayBox = document.createElement('div');
        dayBox.className = 'day-star';
        
        // Định dạng ngày YYYY-MM-DD để so khớp với backend
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
        
        if (checkInDays.includes(dateStr)) {
            dayBox.classList.add('active');
            dayBox.innerHTML = '⭐'; // Hiển thị sao vàng
        } else {
            dayBox.innerText = i;
        }

        if (i === now.getDate()) {
            dayBox.style.border = "2px solid var(--p-pink)";
            dayBox.style.color = "var(--p-pink)";
        }
        grid.appendChild(dayBox);
    }
}

    document.addEventListener('DOMContentLoaded', initDashboard);
</script>
</body>
</html>
