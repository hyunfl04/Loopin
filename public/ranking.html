<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loopin - Leaderboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Nunito', sans-serif; 
            background: linear-gradient(135deg, #f8fffe 0%, #fff9f0 100%); 
            min-height: 100vh; 
            padding: 20px; 
            color: #4A4A4A;
            overflow-x: hidden;
        }
        :root { 
            --pastel-green: #A8E6CF; 
            --pastel-green-dark: #7DC4A5; 
            --pastel-blue: #A8D8EA; 
            --pastel-yellow: #FFEAA7; 
            --pastel-pink: #FFB8B8; 
            --white: #FFFFFF; 
            --text-dark: #2D3436; 
            --text-light: #636E72;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        
        .container { max-width: 800px; margin: 0 auto; animation: fadeIn 0.8s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Navbar */
        .navbar { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 15px 25px; background: var(--white); border-radius: 20px; 
            margin-bottom: 30px; box-shadow: var(--shadow); 
        }
        .nav-brand { font-weight: 800; font-size: 24px; color: var(--pastel-green-dark); text-decoration: none; }
        .btn-back { 
            background: var(--pastel-blue); border: none; padding: 10px 20px; 
            border-radius: 12px; font-weight: 700; cursor: pointer; 
            text-decoration: none; color: var(--text-dark); transition: 0.3s;
        }

        /* Header */
        .rank-header { text-align: center; margin-bottom: 50px; }
        .rank-title { font-size: 42px; font-weight: 800; color: var(--text-dark); }
        .rank-subtitle { color: var(--text-light); font-weight: 600; font-size: 18px; transition: 0.3s; }

        /* Podium */
        .podium { display: flex; justify-content: center; align-items: flex-end; gap: 20px; margin-bottom: 50px; }
        .podium-item { 
            background: var(--white); border-radius: 24px; padding: 25px 15px; 
            text-align: center; box-shadow: var(--shadow); flex: 1; position: relative;
        }
        .podium-1 { height: 220px; z-index: 2; border: 4px solid var(--pastel-yellow); }
        .podium-2 { height: 180px; border: 4px solid var(--pastel-blue); }
        .podium-3 { height: 160px; border: 4px solid var(--pastel-pink); }
        .crown { position: absolute; top: -35px; left: 50%; transform: translateX(-50%); font-size: 40px; }

        /* Leaderboard Rows */
        .leaderboard-card { background: var(--white); border-radius: 35px; padding: 20px; box-shadow: var(--shadow); }
        .rank-row { 
            display: flex; align-items: center; padding: 18px 25px; 
            border-radius: 22px; margin-bottom: 12px; transition: 0.3s;
        }
        .rank-number { width: 50px; font-weight: 900; font-size: 22px; color: #B2BEC3; }
        .list-avatar { width: 48px; height: 48px; border-radius: 14px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-weight: 800; background: #f0f0f0; }
        .rank-name { font-weight: 800; font-size: 18px; }
        .rank-streak { background: #FFF5F0; padding: 8px 15px; border-radius: 12px; font-weight: 800; color: #FF7675; }

        /* Highlight Current User */
        .me { background: #f0fdf4 !important; border: 2px solid var(--pastel-green); }

        /* SHAKE ANIMATION */
        @keyframes rankShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-1deg); }
            50% { transform: translateX(5px) rotate(1deg); }
            75% { transform: translateX(-5px) rotate(-1deg); }
            100% { transform: translateX(0); }
        }
        .rank-up-highlight {
            animation: rankShake 0.5s ease-in-out;
            border: 2px solid var(--pastel-green-dark) !important;
            box-shadow: 0 0 20px rgba(125, 196, 165, 0.4) !important;
            background: #e6ffed !important;
        }

        /* FIRE BURST ANIMATION */
        #streak-burst {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0);
            font-size: 150px; z-index: 9999; pointer-events: none; opacity: 0;
        }
        #streak-burst::after {
            content: 'RANK UP!'; position: absolute; bottom: -40px; left: 50%;
            transform: translateX(-50%); font-size: 24px; font-weight: 900; color: #FF7675; text-shadow: 2px 2px 0px white;
        }
        @keyframes fireBurst {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
            100% { transform: translate(-50%, -120%) scale(0.8); opacity: 0; }
        }
        .animate-fire { animation: fireBurst 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
    </style>
</head>
<body>

<div id="streak-burst">🔥</div>

<div class="container">
    <nav class="navbar">
        <a href="/home" class="nav-brand">🍃 Loopin</a>
        <a href="/home" class="btn-back">⬅️ My Habits</a>
    </nav>

    <header class="rank-header">
        <h1 class="rank-title">Streak Legends</h1>
        <p class="rank-subtitle">Who's staying in the loop the longest?</p>
    </header>

    <div class="podium" id="topThree"></div>

    <div class="leaderboard-card">
        <div id="leaderboardList">
            <p style="text-align: center; padding: 40px;">Gathering the champions...</p>
        </div>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:3001/api';
    const token = localStorage.getItem('loopin_token');
    const currentUser = JSON.parse(localStorage.getItem('loopin_user') || '{}');
    let lastKnownRank = parseInt(localStorage.getItem('last_rank')) || 100;

    if (!token) window.location.href = '/login';

    function triggerFireAnimation() {
        const fire = document.getElementById('streak-burst');
        fire.classList.remove('animate-fire');
        void fire.offsetWidth; 
        fire.classList.add('animate-fire');
    }

    function renderLeaderboard(leaders) {
        const topThreeContainer = document.getElementById('topThree');
        const listContainer = document.getElementById('leaderboardList');

        if (leaders.length > 0) {
            const top1 = leaders[0];
            const top2 = leaders[1] || { username: "---", longestStreak: 0 };
            const top3 = leaders[2] || { username: "---", longestStreak: 0 };

            topThreeContainer.innerHTML = `
                <div class="podium-item podium-2 ${top2.username === currentUser.username ? 'me' : ''}">
                    <div class="rank-avatar" style="font-size:30px; margin-bottom:10px;">🥈</div>
                    <div class="rank-name">${top2.username}</div>
                    <div class="rank-streak">${top2.longestStreak} 🔥</div>
                </div>
                <div class="podium-item podium-1 ${top1.username === currentUser.username ? 'me' : ''}">
                    <div class="crown">👑</div>
                    <div class="rank-avatar" style="font-size:35px; margin-bottom:10px;">🥇</div>
                    <div class="rank-name">${top1.username}</div>
                    <div class="rank-streak">${top1.longestStreak} 🔥</div>
                </div>
                <div class="podium-item podium-3 ${top3.username === currentUser.username ? 'me' : ''}">
                    <div class="rank-avatar" style="font-size:30px; margin-bottom:10px;">🥉</div>
                    <div class="rank-name">${top3.username}</div>
                    <div class="rank-streak">${top3.longestStreak} 🔥</div>
                </div>
            `;
        }

        listContainer.innerHTML = leaders.map((user, index) => {
            const isMe = user.username === currentUser.username;
            return `
                <div class="rank-row ${isMe ? 'me' : ''}" id="${isMe ? 'my-rank-row' : ''}">
                    <div class="rank-number">#${index + 1}</div>
                    <div class="list-avatar">${user.username[0].toUpperCase()}</div>
                    <div class="rank-info" style="flex:1">
                        <div class="rank-name">${user.username} ${isMe ? '(You)' : ''}</div>
                    </div>
                    <div class="rank-streak">${user.longestStreak} 🔥</div>
                </div>
            `;
        }).join('');
    }

    async function fetchLeaderboard() {
        try {
            const response = await fetch(`${API_URL}/leaderboard`, {
                headers: { 'Authorization': 'Bearer ' + token }
            });
            const res = await response.json();
            
            if (res.success) {
                renderLeaderboard(res.data);
                const myIndex = res.data.findIndex(u => u.username === currentUser.username);

                if (myIndex !== -1) {
                    const currentRank = myIndex + 1;
                    if (currentRank < lastKnownRank) {
                        triggerFireAnimation();
                        
                        // Handle the visual shake
                        setTimeout(() => {
                            const myElement = document.querySelector('.me');
                            if (myElement) {
                                myElement.classList.add('rank-up-highlight');
                                document.querySelector('.rank-subtitle').innerText = "You just climbed the ranks! 🚀";
                                setTimeout(() => {
                                    myElement.classList.remove('rank-up-highlight');
                                    document.querySelector('.rank-subtitle').innerText = "Who's staying in the loop the longest?";
                                }, 3500);
                            }
                        }, 200);
                    }
                    lastKnownRank = currentRank;
                    localStorage.setItem('last_rank', lastKnownRank);
                }
            }
        } catch (error) {
            console.error("Fetch error", error);
        }
    }

    fetchLeaderboard();
</script>
</body>
</html>
